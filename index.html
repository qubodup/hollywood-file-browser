<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUNK • STORAGE SCANNER v0.97</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        :root {
            --bg: #002020;
            --panel: #004020;
            --accent: #00a080;
            --bright: #20c0a0;
            --text: #20c0a0;
            --dark-text: #008080;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            color: var(--text);
            font-family: 'VT323', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .terminal {
            width: 100vw;
            max-width: 1280px;
            height: 100vh;
            max-height: 820px;
            background: var(--bg);
            border: 6px solid var(--accent);
            box-shadow: 
                0 0 30px var(--bright),
                inset 0 0 80px rgba(0, 160, 128, 0.25);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            background: var(--panel);
            padding: 10px 16px;
            border-bottom: 3px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 24px;
            flex-shrink: 0;
        }
        
        .logo {
            width: 68px;
            height: 68px;
            border: 3px solid var(--accent);
            background: #001a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            box-shadow: inset 0 0 20px rgba(32, 192, 160, 0.3);
        }
        
        .device-info {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 280px;
            gap: 16px;
            font-size: 17px;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }
        
        .info-label {
            font-size: 13px;
            opacity: 0.8;
            color: var(--dark-text);
            letter-spacing: 1px;
        }
        
        .progress-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .progress-bar {
            width: 100%;
            height: 22px;
            border: 3px solid var(--accent);
            background: #001a1a;
            position: relative;
            overflow: hidden;
        }
        
        .progress-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--bright));
            box-shadow: 0 0 20px var(--bright);
            transition: width 120ms linear;
        }
        
        .control-buttons {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        button {
            background: #002020;
            color: var(--text);
            border: 3px solid var(--accent);
            padding: 10px 28px;
            font-size: 19px;
            font-family: 'VT323', monospace;
            cursor: pointer;
            transition: all 0.1s ease;
            text-shadow: 0 0 8px var(--bright);
        }
        
        button:hover {
            background: var(--accent);
            color: #001a1a;
            box-shadow: 0 0 25px var(--bright);
        }
        
        button:active {
            transform: scale(0.92);
        }
        
        .toolbar {
            background: #003030;
            padding: 8px 16px;
            border-bottom: 3px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .connected {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
        }
        
        .search {
            flex: 1;
            background: #001a1a;
            border: 2px solid var(--accent);
            padding: 8px 14px;
            font-size: 18px;
            color: var(--text);
            font-family: 'VT323', monospace;
        }
        
        .close-btn {
            background: #002020;
            color: var(--text);
            border: 3px solid var(--accent);
            padding: 6px 18px;
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .close-btn:hover {
            background: #440000;
            color: #ff8888;
            border-color: #aa4444;
        }
        
        .file-browser {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
            background: repeating-linear-gradient(
                #002020 0px,
                #002020 2px,
                #001a1a 2px,
                #001a1a 4px
            );
        }
        
        .files-grid {
            flex: 1;
            padding: 18px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) #002020;
        }
        
        .files-grid::-webkit-scrollbar {
            width: 22px;
        }
        
        .files-grid::-webkit-scrollbar-track {
            background: #002020;
            border-left: 3px solid var(--accent);
        }
        
        .files-grid::-webkit-scrollbar-thumb {
            background: var(--accent);
            border: 3px solid #002020;
        }
        
        .file-item {
            background: rgba(0, 64, 64, 0.85);
            border: 2px solid var(--accent);
            padding: 9px 14px;
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 15.5px;
            cursor: pointer;
            transition: all 0.2s ease;
            opacity: 0;
            transform: translateY(10px);
        }
        
        .file-item:hover {
            background: rgba(32, 128, 96, 0.9);
            border-color: var(--bright);
            transform: translateX(8px) translateY(-2px);
            box-shadow: 0 0 22px rgba(32, 192, 160, 0.6);
        }
        
        .file-item .icon {
            width: 26px;
            height: 26px;
            background: var(--accent);
            color: #001a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .file-meta {
            font-size: 13px;
            opacity: 0.85;
            color: #20a0a0;
        }
        
        .file-size {
            margin-left: auto;
            text-align: right;
            font-size: 14px;
            min-width: 70px;
        }
        
        .bottom-bar {
            background: #002020;
            border-top: 4px solid var(--accent);
            padding: 8px 16px;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            line-height: 1.3;
        }
        
        .scan-overlay {
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(
                transparent,
                rgba(32, 192, 160, 0.8),
                transparent
            );
            pointer-events: none;
            z-index: 10;
            animation: scanAnim 3s linear infinite;
            opacity: 0;
        }
        
        @keyframes scanAnim {
            0% { top: -100%; }
            100% { top: 2000%; }
        }
        
        .glow {
            text-shadow: 0 0 12px var(--bright);
        }
    </style>
</head>
<body>
    <div class="terminal" id="terminal">
        <!-- HEADER -->
        <div class="header">
            <div class="logo">◉</div>
            
            <div class="device-info">
                <div class="info-item">
                    <div class="info-label">DEVICE NAME</div>
                    <div id="dev-name">10</div>
                </div>
                <div class="info-item">
                    <div class="info-label">TYPE</div>
                    <div id="dev-type">DATA</div>
                </div>
                <div class="info-item">
                    <div class="info-label">READ</div>
                    <div id="read-stat" class="glow">YES</div>
                </div>
                <div class="info-item">
                    <div class="info-label">WRITE</div>
                    <div id="write-stat" class="glow">YES</div>
                </div>
                <div class="info-item">
                    <div class="info-label">CAPACITY</div>
                    <div class="progress-wrapper">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progress-fill"></div>
                        </div>
                        <span id="progress-text" style="min-width:52px; font-size:18px;">00%</span>
                    </div>
                </div>
            </div>
            
            <div class="control-buttons">
                <button id="run-button">RUN</button>
                <button id="esc-button">ESC / END</button>
            </div>
        </div>
        
        <!-- TOOLBAR -->
        <div class="toolbar">
            <div class="connected">
                <span style="color:#00a080;">CONNECTED</span>
                <span style="color:var(--bright);">◉</span>
            </div>
            <input type="text" class="search" value="SEARCH:" readonly>
            <button id="clear-btn" class="close-btn" title="Clear files">✕</button>
        </div>
        
        <!-- FILE BROWSER -->
        <div class="file-browser">
            <div class="files-grid" id="files-grid"></div>
            <div class="scan-overlay" id="scan-overlay"></div>
        </div>
        
        <!-- BOTTOM STATUS -->
        <div class="bottom-bar">
            <div>
                FORWARD: <span id="fwd">P45.0090</span><br>
                REVERSE: <span id="rev">N12.0</span>
            </div>
            <div>
                BUFFERS: <span id="buf">1192 KB</span><br>
                POS: <span id="pos">01.554</span> COUNT: <span id="count">1</span>
            </div>
            <div>
                INTERFACE: <span id="iface">524.4TH</span><br>
                TRACKS READ: <span id="tracks">3474/7020</span>
            </div>
            <div>
                SECTORS: <span id="sectors">444/4745</span><br>
                LTR: <span id="ltr">0</span>
            </div>
            <div style="text-align:right; margin-left:auto;">
                TEMP: <span id="temp">90.7°F</span><br>
                <span id="overall-status" class="glow">STATUS: GOOD</span>
            </div>
        </div>
    </div>

    <script>
        // Fictional randomized file names (BUNK themed)
        const filesData = [
            {name: "BUNK-ROSTER-09", date: "SEP 08, BUNKDAT 67", size: "712KB"},
            {name: "SHIFT-LOG-10-DRAFT", date: "SEP 30, BUNKDAT 67", size: "983KB"},
            {name: "MAINT-LOG-09", date: "SEP 08, BUNKDAT 67", size: "341KB"},
            {name: "REQ-LEVEL09", date: "SEP 08, BUNKDAT 67", size: "2.1MB"},
            {name: "REPAIR-QUEUE", date: "SEP 08, BUNKDAT 67", size: "8.4MB"},
            {name: "SUPPLY-REQ", date: "SEP 09, BUNKDAT 67", size: "1.8MB"},
            {name: "MONTH-OVERVIEW", date: "SEP 08, BUNKDAT 67", size: "6.2MB"},
            {name: "HYDRO-REQ-09", date: "SEP 08, BUNKDAT 67", size: "4.9MB"},
            {name: "RETURN-LOG09", date: "SEP 08, BUNKDAT 67", size: "623KB"},
            {name: "INV-LEVEL09", date: "SEP 09, BUNKDAT 67", size: "9.1MB"},
            {name: "CORE-REQ", date: "SEP 09, BUNKDAT 67", size: "472KB"},
            {name: "CORE-MAINT", date: "SEP 09, BUNKDAT 67", size: "5.2MB"},
            {name: "DUTY-ROTA-09", date: "SEP 11, BUNKDAT 67", size: "719KB"},
            {name: "CLEAN-CYCLE-13", date: "SEP 13, BUNKDAT 67", size: "912MB"},
            {name: "ALLOC-LOG", date: "SEP 13, BUNKDAT 67", size: "4.1MB"},
            {name: "RESOURCE-ALLOC", date: "SEP 10, BUNKDAT 67", size: "1.9MB"},
            {name: "SYS-REPORT-97", date: "SEP 10, BUNKDAT 67", size: "4.7MB"},
            {name: "UNIT-LIST-97", date: "SEP 10, BUNKDAT 67", size: "8.3MB"},
            {name: "AGRI-CYCLE", date: "SEP 14, BUNKDAT 67", size: "6.4MB"},
            {name: "VERT-REP-LOG", date: "SEP 14, BUNKDAT 67", size: "5.9MB"},
            {name: "VERT-UPDATE", date: "SEP 14, BUNKDAT 67", size: "728KB"},
            {name: "SURGE-LOG", date: "SEP 15, BUNKDAT 67", size: "619KB"},
            {name: "SYS-MNT-09", date: "SEP 15, BUNKDAT 67", size: "8.2MB"},
            {name: "REPAIR-ARCHIVE", date: "SEP 15, BUNKDAT 67", size: "2.9MB"},
            {name: "SERV-LOG-09", date: "SEP 15, BUNKDAT 67", size: "3.7MB"},
            {name: "RES-ALLOC-09", date: "SEP 16, BUNKDAT 67", size: "1.3MB"},
            {name: "VOL-INDEX", date: "SEP 16, BUNKDAT 67", size: "367MB"},
            {name: "VOL-INIT", date: "SEP 17, BUNKDAT 67", size: "912KB"},
            {name: "CACHE-BUFFER", date: "SEP 17, BUNKDAT 67", size: "51MB"},
            {name: "ASSET-DB", date: "SEP 19, BUNKDAT 67", size: "334MB"},
            {name: "VOL-SYNC-LOG", date: "SEP 17, BUNKDAT 67", size: "????"},
            {name: "SUPPORT-ARCHIVE", date: "SEP 17, BUNKDAT 67", size: "????"},
            {name: "ACCESS-LOG-08", date: "SEP 18, BUNKDAT 67", size: "????"}
        ];
        
        let isScanning = false;
        let audioCtx;
        
        function playTone(freq, duration, type = 'square', vol = 0.15) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.value = vol;
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            setTimeout(() => osc.stop(), duration);
        }
        
        function createFile(file) {
            const el = document.createElement('div');
            el.className = 'file-item';
            el.innerHTML = `
                <div class="icon">▦</div>
                <div>
                    <div style="font-weight:bold;">${file.name}</div>
                    <div class="file-meta">${file.date}</div>
                </div>
                <div class="file-size">${file.size}</div>
            `;
            
            el.addEventListener('mouseenter', () => playTone(620, 22, 'sine', 0.08));
            el.addEventListener('click', () => {
                playTone(1350, 35, 'square', 0.2);
                document.querySelectorAll('.file-item').forEach(f => f.style.borderColor = '');
                el.style.borderColor = '#40e0c0';
            });
            
            return el;
        }
        
        function clearFiles() {
            playTone(450, 120, 'sawtooth', 0.25);
            const grid = document.getElementById('files-grid');
            grid.innerHTML = '';
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('progress-text').textContent = '00%';
        }
        
        function startScan() {
            if (isScanning) return;
            isScanning = true;
            
            const runBtn = document.getElementById('run-button');
            runBtn.textContent = 'SCANNING...';
            runBtn.style.background = '#003030';
            
            document.getElementById('scan-overlay').style.opacity = '0.7';
            
            const grid = document.getElementById('files-grid');
            grid.innerHTML = '';
            
            let progress = 0;
            const fill = document.getElementById('progress-fill');
            const progText = document.getElementById('progress-text');
            
            const progInt = setInterval(() => {
                progress = Math.min(70, progress + (Math.random() * 7 + 4));
                fill.style.width = `${progress}%`;
                progText.textContent = `${Math.floor(progress)}%`;
                if (progress >= 70) clearInterval(progInt);
            }, 65);
            
            let idx = 0;
            const scanTimer = setInterval(() => {
                if (idx < filesData.length) {
                    const fileEl = createFile(filesData[idx]);
                    grid.appendChild(fileEl);
                    setTimeout(() => fileEl.style.opacity = '1', 20);
                    setTimeout(() => fileEl.style.transform = 'translateY(0)', 30);
                    idx++;
                    if (Math.random() > 0.6) playTone(920, 28);
                } else {
                    clearInterval(scanTimer);
                    finishScan();
                }
            }, 38);
        }
        
        function finishScan() {
            isScanning = false;
            document.getElementById('run-button').textContent = 'RUN';
            document.getElementById('run-button').style.background = '';
            document.getElementById('scan-overlay').style.opacity = '0';
            
            document.getElementById('tracks').textContent = '7020/7020';
            document.getElementById('sectors').textContent = '4745/4745';
            document.getElementById('overall-status').innerHTML = 'STATUS: <span style="color:#40e0c0">COMPLETE ✓</span>';
        }
        
        function stopScan() {
            isScanning = false;
            document.getElementById('scan-overlay').style.opacity = '0';
            document.getElementById('run-button').textContent = 'RUN';
            document.getElementById('run-button').style.background = '';
        }
        
        window.onload = () => {
            const runBtn = document.getElementById('run-button');
            const escBtn = document.getElementById('esc-button');
            const clearBtn = document.getElementById('clear-btn');
            
            runBtn.addEventListener('click', () => {
                playTone(980, 40, 'square');
                startScan();
            });
            
            escBtn.addEventListener('click', () => {
                playTone(450, 80, 'sawtooth', 0.25);
                stopScan();
            });
            
            clearBtn.addEventListener('click', () => {
                clearFiles();
            });
            
            document.addEventListener('keydown', e => {
                if (e.key === "Escape" || e.key === "End") stopScan();
                if ((e.key === "r" || e.key === "R") && !isScanning) startScan();
                if (e.key === "Delete" || e.key === "Backspace") clearFiles();
            });
            
            document.querySelectorAll('button').forEach(b => {
                b.addEventListener('mouseenter', () => playTone(720, 18, 'sine', 0.1));
            });
            
            console.log("%cBUNK STORAGE INTERFACE LOADED", "color:#20c0a0; font-family:monospace; font-size:13px");
        };
    </script>
</body>
</html>
